<head>
<meta charset="utf-8">

<title>Sonic Forage: Origin Comic</title>
<style>
  :root {
    --bg: #06000f;
    --card-bg: #120520;
    --pink: #ff3b8d;
    --cyan: #00e5ff;
    --yellow: #ffe66d;
    --purple: #b347ea;
    --green: #39ff14;
    --orange: #ff9100;
  }
  * { box-sizing:border-box; margin:0; padding:0; }
  body {
    background: var(--bg);
    color: #fff;
    font-family: 'Segoe UI', system-ui, sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    min-height: 100vh;
    overflow-x: hidden;
  }
  header {
    text-align: center;
    padding: 30px 20px 10px;
  }
  header h1 {
    font-size: clamp(28px, 6vw, 56px);
    color: var(--yellow);
    text-shadow: 0 0 30px var(--pink), 0 0 60px var(--purple);
    line-height: 1.2;
    margin-bottom: 6px;
  }
  header .subtitle {
    color: var(--cyan);
    font-size: 1.1rem;
    opacity: 0.85;
    letter-spacing: 2px;
  }

  /* ---------- comic reader ---------- */
  .reader {
    position: relative;
    width: 100%;
    max-width: 680px;
    margin: 20px auto 40px;
    display: flex;
    flex-direction: column;
    align-items: center;
  }
  .panel-wrapper {
    position: relative;
    width: 100%;
    max-width: 600px;
    aspect-ratio: 1 / 1;
    border: 3px solid var(--pink);
    border-radius: 18px;
    overflow: hidden;
    background: #0a0020;
    box-shadow: 0 0 40px #ff3b8d33, 0 8px 32px #0008;
    transition: opacity 0.3s, transform 0.3s;
  }
  .panel-wrapper.transitioning {
    opacity: 0;
    transform: scale(0.96);
  }
  .panel-svg {
    width: 100%;
    height: 100%;
    display: block;
  }

  /* speech bubble overlay */
  .bubble {
    position: absolute;
    background: #fffc;
    backdrop-filter: blur(4px);
    border: 2px solid #222;
    border-radius: 20px;
    padding: 10px 16px;
    font-weight: 700;
    font-size: 0.9rem;
    color: #111;
    max-width: 260px;
    box-shadow: 0 4px 12px #0004;
    z-index: 10;
    pointer-events: none;
    animation: popIn 0.4s ease-out;
  }
  .bubble::after {
    content: '';
    position: absolute;
    bottom: -8px;
    left: 24px;
    width: 0; height: 0;
    border-left: 8px solid transparent;
    border-right: 8px solid transparent;
    border-top: 10px solid #fffc;
  }
  .bubble.right::after { left: auto; right: 24px; }
  .bubble.thought {
    border-radius: 50px;
    background: #ffeef8ee;
    border-style: dashed;
  }
  @keyframes popIn {
    from { opacity:0; transform: translateY(10px) scale(0.9); }
    to { opacity:1; transform: translateY(0) scale(1); }
  }

  /* navigation */
  .nav {
    display: flex;
    align-items: center;
    gap: 16px;
    margin-top: 20px;
    flex-wrap: wrap;
    justify-content: center;
  }
  .nav button {
    background: var(--card-bg);
    border: 2px solid var(--pink);
    color: var(--pink);
    padding: 10px 22px;
    border-radius: 30px;
    font-size: 1rem;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 1px;
  }
  .nav button:hover {
    background: var(--pink);
    color: #fff;
    box-shadow: 0 0 20px var(--pink);
  }
  .nav button:disabled {
    opacity: 0.35;
    cursor: default;
    pointer-events: none;
  }
  .nav .panel-indicator {
    color: var(--cyan);
    font-weight: 700;
    font-size: 1.1rem;
    min-width: 80px;
    text-align: center;
  }

  /* thumbnail strip */
  .thumb-strip {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    justify-content: center;
    margin-top: 16px;
    max-width: 600px;
  }
  .thumb {
    width: 60px;
    height: 60px;
    border: 2px solid #333;
    border-radius: 8px;
    overflow: hidden;
    cursor: pointer;
    transition: all 0.2s;
    opacity: 0.6;
  }
  .thumb:hover, .thumb.active {
    border-color: var(--pink);
    opacity: 1;
    box-shadow: 0 0 12px var(--pink);
    transform: scale(1.08);
  }
  .thumb svg { width:100%; height:100%; }

  /* keyboard hint */
  .key-hint {
    color: #666;
    font-size: 0.8rem;
    margin-top: 10px;
    text-align: center;
  }

  footer {
    text-align: center;
    padding: 20px;
    color: #555;
    font-size: 0.85rem;
  }
  footer a { color: var(--cyan); text-decoration: none; }
  footer a:hover { color: var(--pink); }
</style>
</head>

// ========== STATE ==========
let currentPanel = 0;
const container = document.getElementById('panelContainer');
const indicator = document.getElementById('panelIndicator');
const thumbStrip = document.getElementById('thumbStrip');
const btnPrev = document.getElementById('btnPrev');
const btnNext = document.getElementById('btnNext');

// ========== RENDER ==========
function renderPanel(index) {
  const p = panels[index];
  container.classList.add('transitioning');
  setTimeout(() => {
    container.innerHTML = `
      <svg class="panel-svg" viewBox="0 0 600 600" xmlns="http://www.w3.org/2000/svg">
        ${p.svg}
      </svg>
      ${p.bubble ? `<div class="bubble ${p.bubble.cls}" style="top:${p.bubble.top};left:${p.bubble.left}">${p.bubble.text}</div>` : ''}
    `;
    container.classList.remove('transitioning');
    updateNav(index);
  }, 150);
}

function updateNav(index) {
  indicator.textContent = `${index + 1} / ${panels.length}`;
  btnPrev.disabled = index === 0;
  btnNext.disabled = index === panels.length - 1;
  // update thumbnails
  document.querySelectorAll('.thumb').forEach((t, i) => {
    t.classList.toggle('active', i === index);
  });
}

function goPanel(delta) {
  const next = currentPanel + delta;
  if (next >= 0 && next < panels.length) {
    currentPanel = next;
    renderPanel(currentPanel);
  }
}

// ========== THUMBNAILS ==========
function buildThumbnails() {
  thumbStrip.innerHTML = '';
  panels.forEach((p, i) => {
    const div = document.createElement('div');
    div.className = 'thumb' + (i === 0 ? ' active' : '');
    div.title = p.title;  // Use native tooltip instead of data attributes
    div.innerHTML = `<svg viewBox="0 0 600 600">${p.svg}</svg>`;
    div.addEventListener('click', () => {
      currentPanel = i;
      renderPanel(i);
    });
    thumbStrip.appendChild(div);
    // Store the index directly
    div._panelIndex = i;
  });
}

// ========== KEYBOARD ==========
document.addEventListener('keydown', (e) => {
  if (e.key === 'ArrowRight' || e.key === 'ArrowDown') {
    e.preventDefault();
    goPanel(1);
  } else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
    e.preventDefault();
    goPanel(-1);
  }
});

// ========== INIT ==========
buildThumbnails();
renderPanel(0);

// add panel title display
const titleEl = document.createElement('div');
titleEl.style.cssText = 'text-align:center;color:var(--cyan);font-size:1.2rem;font-weight:700;margin:8px 0;min-height:28px;';
container.parentNode.insertBefore(titleEl, container.nextSibling);

const origRender = renderPanel;
renderPanel = function(idx) {
  titleEl.textContent = panels[idx].title;
  origRender(idx);
};

// add caption display
const captionEl = document.createElement('div');
captionEl.style.cssText = 'text-align:center;color:#999;font-size:0.85rem;margin:4px 0 0;max-width:600px;line-height:1.4;font-style:italic;';
container.parentNode.insertBefore(captionEl, titleEl.nextSibling);

renderPanel = function(idx) {
  titleEl.textContent = panels[idx].title;
  captionEl.textContent = panels[idx].caption;
  origRender(idx);
};
renderPanel(0);
</script>
